<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Zen+Dots&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animus.css">
    <title>Random game selector</title>
</head>
<body>

    <div class="locus">
        <div class="locus-inner-frame">
            
            <!-- NAVBAR -->
            <nav class="navbar">   <!-- future 'add game' functionality -->
                <a href="index.html" class="nav-anchor nav-left">← BACK</a>
            </nav>

            <!-- HEADER -->
            <header>
                <h2>Sign up</h2>
            </header>

            <!-- MAIN CONTAINER -->
            <main class="main">

                <form action="">
                    <div class="grid grid-gap">
                        <label for="login">LOGIN</label>
                        <input type="text" id="login" name="login">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password">
                        <label for="repeat-password">REPEAT PASSWORD</label>
                        <input type="password" id="repeat-password" name="repeat-password">
                        <div class="flex frame btn-frame">
                            <button class="btn" type="submit">SIGN UP!</button>
                        </div>
                    </div>
                </form>

            </main>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p class="small">App made by <a href="#">Anabelle of the Wildhunt</a></p> <!-- signature -->
        <p class="small">Background picture used from olenkasergienko's Unsplash repository</p>
    </footer>

<script src="mens.js"></script>
</body>
</html>
